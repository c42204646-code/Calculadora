<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Comercial BCV</title>
    <!-- Tailwind CSS para los estilos responsivos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons para la iconografía -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4 font-sans text-slate-800">

    <div class="bg-white w-full max-w-md rounded-3xl shadow-xl overflow-hidden border border-gray-100">
        
        <!-- Encabezado y Tasas -->
        <div class="bg-gradient-to-r from-blue-700 to-blue-900 p-4 sm:p-6 text-white">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-lg sm:text-xl font-bold flex items-center gap-2">
                    <i data-lucide="wallet" class="w-5 h-5 sm:w-6 sm:h-6"></i>
                    Caja Rápida
                </h1>
                <button 
                    id="btnRefresh"
                    class="p-2 rounded-full bg-white/10 hover:bg-white/20 transition-colors focus:outline-none"
                    title="Actualizar tasas"
                >
                    <i data-lucide="refresh-cw" class="w-[18px] h-[18px]" id="refreshIcon"></i>
                </button>
            </div>
            
            <div class="bg-white/10 rounded-2xl p-3 sm:p-4 backdrop-blur-sm border border-white/20">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-xs sm:text-sm font-medium text-blue-100">Tasas del Día (Bs)</span>
                    
                    <!-- Botones de Edición -->
                    <button id="btnEdit" class="text-blue-200 hover:text-white transition flex items-center gap-1 text-xs bg-white/10 px-2 py-1 rounded-lg">
                        <i data-lucide="edit-2" class="w-3 h-3"></i> Editar
                    </button>
                    <button id="btnSave" class="hidden text-green-300 hover:text-green-200 transition flex items-center gap-1 text-xs bg-green-500/20 px-2 py-1 rounded-lg border border-green-500/30">
                        <i data-lucide="check" class="w-3 h-3"></i> Guardar
                    </button>
                </div>

                <!-- Vista de Tasas (Modo Lectura) -->
                <div id="viewRates" class="flex justify-between gap-1 sm:gap-2">
                    <div class="flex-1 flex flex-col sm:flex-row items-center justify-center gap-1 sm:gap-2 bg-white/5 rounded-lg py-1.5 px-1">
                        <div class="bg-green-500/20 p-1 sm:p-1.5 rounded-lg text-green-300">
                            <i data-lucide="dollar-sign" class="w-3 h-3 sm:w-4 sm:h-4"></i>
                        </div>
                        <div id="displayUsd" class="font-bold text-xs sm:text-sm">--.--</div>
                    </div>
                    <div class="flex-1 flex flex-col sm:flex-row items-center justify-center gap-1 sm:gap-2 bg-white/5 rounded-lg py-1.5 px-1">
                        <div class="bg-blue-400/20 p-1 sm:p-1.5 rounded-lg text-blue-300">
                            <i data-lucide="euro" class="w-3 h-3 sm:w-4 sm:h-4"></i>
                        </div>
                        <div id="displayEur" class="font-bold text-xs sm:text-sm">--.--</div>
                    </div>
                    <div class="flex-1 flex flex-col sm:flex-row items-center justify-center gap-1 sm:gap-2 bg-white/5 rounded-lg py-1.5 px-1">
                        <div class="bg-yellow-400/20 p-1 sm:p-1.5 rounded-lg text-yellow-300">
                            <i data-lucide="coins" class="w-3 h-3 sm:w-4 sm:h-4"></i>
                        </div>
                        <div id="displayUsdt" class="font-bold text-xs sm:text-sm" title="Binance P2P">--.--</div>
                    </div>
                </div>

                <!-- Vista de Edición (Modo Edición) -->
                <div id="editRates" class="hidden flex gap-2">
                    <div class="flex-1">
                        <label class="text-[9px] sm:text-[10px] text-blue-200 uppercase tracking-wider block text-center mb-1">USD</label>
                        <input type="number" id="inputManualUsd" class="w-full bg-white/20 border border-white/30 rounded px-1 py-1 text-white text-xs sm:text-sm focus:outline-none focus:ring-2 focus:ring-white/50 text-center"/>
                    </div>
                    <div class="flex-1">
                        <label class="text-[9px] sm:text-[10px] text-blue-200 uppercase tracking-wider block text-center mb-1">EUR</label>
                        <input type="number" id="inputManualEur" class="w-full bg-white/20 border border-white/30 rounded px-1 py-1 text-white text-xs sm:text-sm focus:outline-none focus:ring-2 focus:ring-white/50 text-center"/>
                    </div>
                    <div class="flex-1">
                        <label class="text-[9px] sm:text-[10px] text-blue-200 uppercase tracking-wider block text-center mb-1">USDT</label>
                        <input type="number" id="inputManualUsdt" class="w-full bg-white/20 border border-white/30 rounded px-1 py-1 text-white text-xs sm:text-sm focus:outline-none focus:ring-2 focus:ring-white/50 text-center"/>
                    </div>
                </div>
                
                <div id="lastUpdated" class="mt-3 text-[10px] text-blue-200 text-right">
                    Iniciando sistema...
                </div>
            </div>
        </div>

        <div class="p-6">
            <!-- Alerta de Error -->
            <div id="errorAlert" class="hidden mb-6 bg-red-50 text-red-600 p-3 rounded-xl flex items-start gap-3 text-sm border border-red-100">
                <i data-lucide="alert-circle" class="w-[18px] h-[18px] shrink-0 mt-0.5"></i>
                <p id="errorText"></p>
            </div>

            <div class="space-y-6">
                <!-- Input Origen -->
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-gray-500">Cantidad a convertir</label>
                    <div class="relative">
                        <input
                            type="number"
                            id="amountInput"
                            value="1"
                            class="w-full text-xl sm:text-2xl md:text-3xl font-bold text-gray-800 bg-gray-50 border border-gray-200 rounded-2xl py-4 pl-3 sm:pl-4 pr-[100px] sm:pr-[110px] focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                            placeholder="0.00"
                        />
                        <select
                            id="fromCurrency"
                            class="absolute right-2 top-1/2 -translate-y-1/2 bg-white border border-gray-200 text-gray-700 text-xs sm:text-sm font-bold rounded-xl px-2 sm:px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none shadow-sm cursor-pointer"
                        >
                            <option value="VES">Bs (VES)</option>
                            <option value="USD" selected>USD ($)</option>
                            <option value="EUR">EUR (€)</option>
                            <option value="USDT">USDT (₮)</option>
                        </select>
                    </div>
                </div>

                <!-- Botón Invertir -->
                <div class="flex justify-center -my-3 relative z-10">
                    <button 
                        id="btnSwap"
                        class="bg-blue-100 hover:bg-blue-200 text-blue-700 p-3 rounded-full border-4 border-white shadow-sm transition-transform hover:scale-105 active:scale-95 focus:outline-none"
                    >
                        <i data-lucide="arrow-right-left" class="w-5 h-5 rotate-90"></i>
                    </button>
                </div>

                <!-- Input Destino (Resultado) -->
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-gray-500">Resultado equivalente</label>
                    <div class="relative">
                        <div id="resultDisplay" class="w-full text-xl sm:text-2xl md:text-3xl font-bold text-blue-700 bg-blue-50 border border-blue-100 rounded-2xl py-4 pl-3 sm:pl-4 pr-[100px] sm:pr-[110px] overflow-x-auto whitespace-nowrap [scrollbar-width:none] [-ms-overflow-style:none] [&::-webkit-scrollbar]:hidden">
                            0.00
                        </div>
                        <select
                            id="toCurrency"
                            class="absolute right-2 top-1/2 -translate-y-1/2 bg-white border border-gray-200 text-gray-700 text-xs sm:text-sm font-bold rounded-xl px-2 sm:px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none shadow-sm cursor-pointer"
                        >
                            <option value="VES" selected>Bs (VES)</option>
                            <option value="USD">USD ($)</option>
                            <option value="EUR">EUR (€)</option>
                            <option value="USDT">USDT (₮)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="mt-8 pt-4 border-t border-gray-100 text-center">
                <p class="text-[10px] text-gray-400">
                    Tasas obtenidas del BCV Oficial y Mercado P2P. Verifique antes de facturar.
                </p>
            </div>
        </div>
    </div>

    <script>
        // Inicializar iconos
        lucide.createIcons();

        // Estado inicial de la aplicación (Precios realistas de referencia)
        let rates = { USD: 39.50, EUR: 42.10, USDT: 43.00 };
        let isLoading = false;
        let isEditing = false;

        // Referencias del DOM
        const displayUsd = document.getElementById('displayUsd');
        const displayEur = document.getElementById('displayEur');
        const displayUsdt = document.getElementById('displayUsdt');
        const lastUpdated = document.getElementById('lastUpdated');
        const refreshIcon = document.getElementById('refreshIcon');
        const btnRefresh = document.getElementById('btnRefresh');
        const errorAlert = document.getElementById('errorAlert');
        const errorText = document.getElementById('errorText');
        
        const btnEdit = document.getElementById('btnEdit');
        const btnSave = document.getElementById('btnSave');
        const viewRates = document.getElementById('viewRates');
        const editRates = document.getElementById('editRates');
        const inputManualUsd = document.getElementById('inputManualUsd');
        const inputManualEur = document.getElementById('inputManualEur');
        const inputManualUsdt = document.getElementById('inputManualUsdt');

        const amountInput = document.getElementById('amountInput');
        const fromCurrency = document.getElementById('fromCurrency');
        const toCurrency = document.getElementById('toCurrency');
        const btnSwap = document.getElementById('btnSwap');
        const resultDisplay = document.getElementById('resultDisplay');

        // Formateador de moneda
        const formatCurrency = (value, currency) => {
            return new Intl.NumberFormat('es-VE', {
                style: 'currency',
                currency: currency,
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(value);
        };

        // Función principal de cálculo
        const calculateAndRender = () => {
            const numAmount = parseFloat(amountInput.value) || 0;
            const from = fromCurrency.value;
            const to = toCurrency.value;
            
            let result = 0;

            if (from === to) {
                result = numAmount;
            } else if (to === 'VES') {
                result = numAmount * rates[from];
            } else if (from === 'VES') {
                result = numAmount / rates[to];
            } else {
                const amountInVes = numAmount * rates[from];
                result = amountInVes / rates[to];
            }

            resultDisplay.textContent = formatCurrency(result, to);
        };

        const updateRatesUI = (timeString) => {
            displayUsd.textContent = rates.USD.toFixed(2);
            displayEur.textContent = rates.EUR.toFixed(2);
            displayUsdt.textContent = rates.USDT.toFixed(2);
            if (timeString) lastUpdated.textContent = `Última act: ${timeString}`;
            calculateAndRender();
        };

        // Función de conexión para obtener tasas reales (Corregida)
        const fetchRates = async () => {
            if (isLoading) return;
            isLoading = true;
            refreshIcon.classList.add('animate-spin');
            errorAlert.classList.add('hidden');
            lastUpdated.textContent = 'Consultando mercados...';

            let updatedRates = { usd: null, eur: null, usdt: null };
            let hasErrors = false;

            // 1. Obtener BCV Oficial leyendo la página
            try {
                const proxyUrl = 'https://api.allorigins.win/get?url=';
                const bcvUrl = encodeURIComponent('https://www.bcv.org.ve/');
                const res = await fetch(proxyUrl + bcvUrl);
                const data = await res.json();
                
                // Parseamos el HTML recibido
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.contents, 'text/html');
                
                // Buscamos los valores exactos
                const usdText = doc.querySelector('#dolar strong')?.innerText?.trim().replace(',', '.');
                const eurText = doc.querySelector('#euro strong')?.innerText?.trim().replace(',', '.');
                
                if (usdText && !isNaN(parseFloat(usdText))) updatedRates.usd = parseFloat(usdText);
                if (eurText && !isNaN(parseFloat(eurText))) updatedRates.eur = parseFloat(eurText);
            } catch (e) {
                console.warn("Error leyendo BCV:", e);
                hasErrors = true;
            }

            // 2. Obtener USDT desde Yadio (Binance P2P Real)
            try {
                const yadioRes = await fetch('https://api.yadio.io/exrates/USD');
                if (yadioRes.ok) {
                    const yadioData = await yadioRes.json();
                    if (yadioData.USD && yadioData.USD.VES) {
                        updatedRates.usdt = parseFloat(yadioData.USD.VES);
                    }
                }
            } catch (e) {
                console.warn("Error leyendo Yadio/USDT:", e);
                hasErrors = true;
            }

            // 3. Aplicar resultados
            let succesfulUpdate = false;
            if (updatedRates.usd && updatedRates.usd > 0) { rates.USD = updatedRates.usd; succesfulUpdate = true; }
            if (updatedRates.eur && updatedRates.eur > 0) { rates.EUR = updatedRates.eur; }
            if (updatedRates.usdt && updatedRates.usdt > 0) { rates.USDT = updatedRates.usdt; succesfulUpdate = true; }

            const now = new Date();
            const timeStr = now.toLocaleTimeString('es-VE', { hour: '2-digit', minute:'2-digit' });

            if (succesfulUpdate) {
                updateRatesUI(timeStr);
                if (hasErrors) {
                    // Actualizó al menos una, pero falló la otra
                    errorText.textContent = 'Advertencia: Algunos mercados tardaron en responder. Revise las tasas.';
                    errorAlert.classList.remove('hidden');
                }
            } else {
                errorText.textContent = 'No se pudo conectar a internet o los servidores fallaron. Por favor, ingrese los valores manualmente.';
                errorAlert.classList.remove('hidden');
                updateRatesUI('Modo Manual Sugerido');
            }

            isLoading = false;
            refreshIcon.classList.remove('animate-spin');
        };

        // Configurar Eventos
        amountInput.addEventListener('input', calculateAndRender);
        fromCurrency.addEventListener('change', calculateAndRender);
        toCurrency.addEventListener('change', calculateAndRender);

        btnSwap.addEventListener('click', () => {
            const temp = fromCurrency.value;
            fromCurrency.value = toCurrency.value;
            toCurrency.value = temp;
            calculateAndRender();
        });

        btnRefresh.addEventListener('click', fetchRates);

        // Eventos de edición Manual
        btnEdit.addEventListener('click', () => {
            isEditing = true;
            inputManualUsd.value = rates.USD.toFixed(2);
            inputManualEur.value = rates.EUR.toFixed(2);
            inputManualUsdt.value = rates.USDT.toFixed(2);
            
            btnEdit.classList.add('hidden');
            btnSave.classList.remove('hidden');
            viewRates.classList.add('hidden');
            editRates.classList.remove('hidden');
            errorAlert.classList.add('hidden');
        });

        btnSave.addEventListener('click', () => {
            const newUsd = parseFloat(inputManualUsd.value);
            const newEur = parseFloat(inputManualEur.value);
            const newUsdt = parseFloat(inputManualUsdt.value);

            if (!isNaN(newUsd) && !isNaN(newEur) && !isNaN(newUsdt)) {
                rates.USD = newUsd;
                rates.EUR = newEur;
                rates.USDT = newUsdt;
                
                isEditing = false;
                btnEdit.classList.remove('hidden');
                btnSave.classList.add('hidden');
                viewRates.classList.remove('hidden');
                editRates.classList.add('hidden');
                
                updateRatesUI('Edición Manual');
            }
        });

        // Iniciar la aplicación al cargar
        fetchRates();

    </script>
</body>
</html>
