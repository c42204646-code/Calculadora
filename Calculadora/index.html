<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Comercial BCV</title>
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4 font-sans text-slate-800">

    <div class="bg-white w-full max-w-md rounded-3xl shadow-xl overflow-hidden border border-gray-100">
        
        <!-- Encabezado -->
        <div class="bg-gradient-to-r from-blue-700 to-blue-900 p-6 text-white">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <i data-lucide="wallet" class="w-6 h-6"></i>
                    Caja Rápida BCV
                </h1>
                <button 
                    id="btnRefresh"
                    class="p-2 rounded-full bg-white/10 hover:bg-white/20 transition-colors"
                    title="Actualizar tasas"
                >
                    <i data-lucide="refresh-cw" class="w-[18px] h-[18px]" id="refreshIcon"></i>
                </button>
            </div>
            
            <div class="bg-white/10 rounded-2xl p-4 backdrop-blur-sm border border-white/20">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm font-medium text-blue-100">Tasas del Día (Bs)</span>
                    
                    <!-- Botón Editar -->
                    <button id="btnEdit" class="text-blue-200 hover:text-white transition flex items-center gap-1 text-xs bg-white/10 px-2 py-1 rounded-lg">
                        <i data-lucide="edit-2" class="w-3 h-3"></i> Editar
                    </button>
                    <!-- Botón Guardar (Oculto por defecto) -->
                    <button id="btnSave" class="hidden text-green-300 hover:text-green-200 transition flex items-center gap-1 text-xs bg-green-500/20 px-2 py-1 rounded-lg border border-green-500/30">
                        <i data-lucide="check" class="w-3 h-3"></i> Guardar
                    </button>
                </div>

                <!-- Vista de Tasas -->
                <div id="viewRates" class="flex gap-4">
                    <div class="flex-1 flex items-center gap-2">
                        <div class="bg-green-500/20 p-1.5 rounded-lg text-green-300">
                            <i data-lucide="dollar-sign" class="w-4 h-4"></i>
                        </div>
                        <div>
                            <div id="displayUsd" class="font-bold">--.--</div>
                        </div>
                    </div>
                    <div class="flex-1 flex items-center gap-2">
                        <div class="bg-blue-400/20 p-1.5 rounded-lg text-blue-300">
                            <i data-lucide="euro" class="w-4 h-4"></i>
                        </div>
                        <div>
                            <div id="displayEur" class="font-bold">--.--</div>
                        </div>
                    </div>
                </div>

                <!-- Vista de Edición (Oculta por defecto) -->
                <div id="editRates" class="hidden flex gap-4">
                    <div class="flex-1">
                        <label class="text-[10px] text-blue-200 uppercase tracking-wider">Dólar (USD)</label>
                        <input 
                            type="number" 
                            id="inputManualUsd"
                            class="w-full bg-white/20 border border-white/30 rounded px-2 py-1 text-white text-sm focus:outline-none focus:ring-2 focus:ring-white/50"
                        />
                    </div>
                    <div class="flex-1">
                        <label class="text-[10px] text-blue-200 uppercase tracking-wider">Euro (EUR)</label>
                        <input 
                            type="number" 
                            id="inputManualEur"
                            class="w-full bg-white/20 border border-white/30 rounded px-2 py-1 text-white text-sm focus:outline-none focus:ring-2 focus:ring-white/50"
                        />
                    </div>
                </div>
                
                <div id="lastUpdated" class="mt-3 text-[10px] text-blue-200 text-right">
                    Actualizando...
                </div>
            </div>
        </div>

        <div class="p-6">
            <!-- Alerta de Error (Oculta por defecto) -->
            <div id="errorAlert" class="hidden mb-6 bg-red-50 text-red-600 p-3 rounded-xl flex items-start gap-3 text-sm border border-red-100">
                <i data-lucide="alert-circle" class="w-[18px] h-[18px] shrink-0 mt-0.5"></i>
                <p id="errorText"></p>
            </div>

            <div class="space-y-6">
                <!-- Input Origen -->
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-gray-500">Cantidad a convertir</label>
                    <div class="relative">
                        <input
                            type="number"
                            id="amountInput"
                            value="1"
                            class="w-full text-3xl font-bold text-gray-800 bg-gray-50 border border-gray-200 rounded-2xl py-4 pl-4 pr-24 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                            placeholder="0.00"
                        />
                        <select
                            id="fromCurrency"
                            class="absolute right-2 top-1/2 -translate-y-1/2 bg-white border border-gray-200 text-gray-700 text-sm font-bold rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none shadow-sm cursor-pointer"
                        >
                            <option value="VES">Bs (VES)</option>
                            <option value="USD" selected>USD ($)</option>
                            <option value="EUR">EUR (€)</option>
                        </select>
                    </div>
                </div>

                <!-- Botón Invertir -->
                <div class="flex justify-center -my-3 relative z-10">
                    <button 
                        id="btnSwap"
                        class="bg-blue-100 hover:bg-blue-200 text-blue-700 p-3 rounded-full border-4 border-white shadow-sm transition-transform hover:scale-105 active:scale-95"
                    >
                        <i data-lucide="arrow-right-left" class="w-5 h-5 rotate-90"></i>
                    </button>
                </div>

                <!-- Input Destino (Resultado) -->
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-gray-500">Resultado equivalente</label>
                    <div class="relative">
                        <div id="resultDisplay" class="w-full text-3xl font-bold text-blue-700 bg-blue-50 border border-blue-100 rounded-2xl py-4 pl-4 pr-24 overflow-hidden text-ellipsis whitespace-nowrap">
                            0.00
                        </div>
                        <select
                            id="toCurrency"
                            class="absolute right-2 top-1/2 -translate-y-1/2 bg-white border border-gray-200 text-gray-700 text-sm font-bold rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none shadow-sm cursor-pointer"
                        >
                            <option value="VES" selected>Bs (VES)</option>
                            <option value="USD">USD ($)</option>
                            <option value="EUR">EUR (€)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="mt-8 pt-4 border-t border-gray-100 text-center">
                <p class="text-xs text-gray-400">
                    Las tasas automáticas son provistas por APIs comunitarias públicas (DolarAPI). Se recomienda verificar los montos antes de facturar.
                </p>
            </div>
        </div>
    </div>

    <script>
        // Inicializar iconos
        lucide.createIcons();

        // Estado de la aplicación
        let rates = { USD: 36.50, EUR: 39.20 };
        let isLoading = false;
        let isEditing = false;

        // Referencias del DOM
        const displayUsd = document.getElementById('displayUsd');
        const displayEur = document.getElementById('displayEur');
        const lastUpdated = document.getElementById('lastUpdated');
        const refreshIcon = document.getElementById('refreshIcon');
        const btnRefresh = document.getElementById('btnRefresh');
        const errorAlert = document.getElementById('errorAlert');
        const errorText = document.getElementById('errorText');
        
        // Elementos de edición
        const btnEdit = document.getElementById('btnEdit');
        const btnSave = document.getElementById('btnSave');
        const viewRates = document.getElementById('viewRates');
        const editRates = document.getElementById('editRates');
        const inputManualUsd = document.getElementById('inputManualUsd');
        const inputManualEur = document.getElementById('inputManualEur');

        // Elementos de la calculadora
        const amountInput = document.getElementById('amountInput');
        const fromCurrency = document.getElementById('fromCurrency');
        const toCurrency = document.getElementById('toCurrency');
        const btnSwap = document.getElementById('btnSwap');
        const resultDisplay = document.getElementById('resultDisplay');

        // Formateador de moneda
        const formatCurrency = (value, currency) => {
            return new Intl.NumberFormat('es-VE', {
                style: 'currency',
                currency: currency,
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(value);
        };

        // Función para calcular y actualizar resultado
        const calculateAndRender = () => {
            const numAmount = parseFloat(amountInput.value) || 0;
            const from = fromCurrency.value;
            const to = toCurrency.value;
            
            let result = 0;

            if (from === to) {
                result = numAmount;
            } else {
                // De extranjera a Bs
                if (from === 'USD' && to === 'VES') result = numAmount * rates.USD;
                if (from === 'EUR' && to === 'VES') result = numAmount * rates.EUR;
                
                // De Bs a extranjera
                if (from === 'VES' && to === 'USD') result = numAmount / rates.USD;
                if (from === 'VES' && to === 'EUR') result = numAmount / rates.EUR;

                // Cruzado
                if (from === 'USD' && to === 'EUR') result = (numAmount * rates.USD) / rates.EUR;
                if (from === 'EUR' && to === 'USD') result = (numAmount * rates.EUR) / rates.USD;
            }

            resultDisplay.textContent = formatCurrency(result, to);
        };

        // Actualizar UI de tasas
        const updateRatesUI = (timeString) => {
            displayUsd.textContent = rates.USD.toFixed(2);
            displayEur.textContent = rates.EUR.toFixed(2);
            if (timeString) lastUpdated.textContent = `Última act: ${timeString}`;
            calculateAndRender();
        };

        // Obtener tasas de la API
        const fetchRates = async () => {
            if (isLoading) return;
            isLoading = true;
            refreshIcon.classList.add('animate-spin');
            errorAlert.classList.add('hidden');
            lastUpdated.textContent = 'Actualizando...';

            try {
                const [usdRes, eurRes] = await Promise.all([
                    fetch('https://ve.dolarapi.com/v1/dolares/oficial'),
                    fetch('https://ve.dolarapi.com/v1/euros/oficial')
                ]);

                if (!usdRes.ok || !eurRes.ok) throw new Error('Fallo del servidor');

                const usdData = await usdRes.json();
                const eurData = await eurRes.json();

                rates.USD = usdData.promedio;
                rates.EUR = eurData.promedio;

                const now = new Date();
                const timeStr = now.toLocaleTimeString('es-VE', { hour: '2-digit', minute:'2-digit' });
                updateRatesUI(timeStr);

            } catch (err) {
                console.error(err);
                errorText.textContent = 'Sin conexión. Usa el botón "Editar" para ingresar la tasa manual.';
                errorAlert.classList.remove('hidden');
                updateRatesUI('Error de red');
            } finally {
                isLoading = false;
                refreshIcon.classList.remove('animate-spin');
            }
        };

        // Eventos de la calculadora
        amountInput.addEventListener('input', calculateAndRender);
        fromCurrency.addEventListener('change', calculateAndRender);
        toCurrency.addEventListener('change', calculateAndRender);

        btnSwap.addEventListener('click', () => {
            const temp = fromCurrency.value;
            fromCurrency.value = toCurrency.value;
            toCurrency.value = temp;
            calculateAndRender();
        });

        btnRefresh.addEventListener('click', fetchRates);

        // Lógica de edición manual
        btnEdit.addEventListener('click', () => {
            isEditing = true;
            inputManualUsd.value = rates.USD;
            inputManualEur.value = rates.EUR;
            
            btnEdit.classList.add('hidden');
            btnSave.classList.remove('hidden');
            viewRates.classList.add('hidden');
            editRates.classList.remove('hidden');
            errorAlert.classList.add('hidden'); // Ocultar error al editar
        });

        btnSave.addEventListener('click', () => {
            const newUsd = parseFloat(inputManualUsd.value);
            const newEur = parseFloat(inputManualEur.value);

            if (!isNaN(newUsd) && !isNaN(newEur)) {
                rates.USD = newUsd;
                rates.EUR = newEur;
                
                isEditing = false;
                btnEdit.classList.remove('hidden');
                btnSave.classList.add('hidden');
                viewRates.classList.remove('hidden');
                editRates.classList.add('hidden');
                
                updateRatesUI('Manual');
            }
        });

        // Iniciar app
        fetchRates();

    </script>
</body>
</html>
